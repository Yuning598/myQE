# Cross-Course graph source of truth.
# To add a concept:
# 1. Add one node under `nodes` with a stable `id`.
# 2. Use a `theme` label that exactly matches one `themes[].label`.
# 3. Set `url` to the published HTML path from the book root.
# 4. Add one or more edges under `edges`.
# 5. If it belongs in the theme's proof-chain highlight, add its id to `themes[].route`.
# Keep labels short; put formulas and exam logic in bridge notes, not here.
version: 1
default_node: bridge_state_prices
themes:
  - id: state_prices_sdf_complete_markets
    label: Payoff span and pricing functionals
    route:
      - micro_state_contingent
      - micro_arrow
      - bridge_state_prices
      - ap_sdf
      - ps_payoff_matrix
  - id: risk_aversion_mean_variance_capm
    label: Marginal utility and covariance pricing
    route:
      - micro_jensen
      - bridge_risk_capm
      - ap_cara_normal
      - ap_capm
  - id: projection_beta_pricing
    label: Orthogonality and beta restrictions
    route:
      - metrics_projection
      - metrics_projection_matrix
      - bridge_projection_beta
      - ap_factor_beta
      - ap_fama_macbeth
  - id: gmm_euler_equation
    label: Moment restrictions and pricing errors
    route:
      - metrics_gmm
      - metrics_overid
      - bridge_gmm_euler
      - ap_euler
      - ap_gmm
  - id: identification_corporate_finance
    label: Identification assumptions in empirical finance
    route:
      - metrics_iv
      - metrics_did_rd
      - bridge_ident_cf
      - corp_threats
      - corp_methods
  - id: dynamic_programming_hjb
    label: Recursive value problems and verification
    route:
      - micro_uncertainty_dynamic
      - micro_contracts
      - bridge_dp_hjb
      - ap_dynamic
      - ap_hjb
