<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QE Cross-Course Knowledge Graph</title>
  <style>
    :root {
      --bg: #f7f8fa;
      --panel: #ffffff;
      --ink: #18202a;
      --muted: #5e6b7a;
      --line: #d6dde6;
      --line-strong: #9aa8b8;
      --accent: #0b7a75;
      --accent-2: #b55324;
      --micro: #3b82f6;
      --metrics: #7c3aed;
      --ap: #059669;
      --corp: #dc2626;
      --ps: #d97706;
      --bridge: #111827;
      --shadow: 0 10px 32px rgba(26, 39, 61, 0.10);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--ink);
    }

    body {
      overflow: hidden;
    }

    .app {
      display: grid;
      grid-template-columns: 300px 1fr 330px;
      gap: 12px;
      height: 100vh;
      min-height: 720px;
      padding: 12px;
    }

    .panel,
    .graph-shell {
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }

    .panel {
      border-radius: 8px;
      overflow: auto;
    }

    .panel-inner {
      padding: 16px;
    }

    .title {
      margin: 0 0 6px;
      font-size: 18px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .section-title {
      margin: 18px 0 8px;
      font-size: 12px;
      font-weight: 700;
      color: #344154;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .search {
      width: 100%;
      height: 38px;
      padding: 0 11px;
      border: 1px solid var(--line);
      border-radius: 6px;
      font-size: 14px;
      color: var(--ink);
      background: #fbfcfd;
      outline: none;
    }

    .search:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(11, 122, 117, 0.12);
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .chip {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #f8fafc;
      color: #263244;
      cursor: pointer;
      font-size: 12px;
      line-height: 1.2;
      padding: 7px 9px;
      transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
    }

    .chip.active {
      background: #e8f5f4;
      border-color: var(--accent);
      color: #075e59;
      font-weight: 700;
    }

    .chip[data-count]::after {
      content: attr(data-count);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 18px;
      height: 18px;
      margin-left: 6px;
      padding: 0 5px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.08);
      color: #334155;
      font-size: 11px;
      font-weight: 800;
    }

    .course-list {
      display: grid;
      gap: 7px;
    }

    .course-row {
      display: grid;
      grid-template-columns: 14px 1fr;
      gap: 8px;
      align-items: start;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px;
      cursor: pointer;
      background: #fbfcfd;
    }

    .course-row input {
      margin: 2px 0 0;
    }

    .course-name {
      font-size: 13px;
      font-weight: 650;
    }

    .course-hint {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .legend {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .legend-item {
      display: flex;
      gap: 7px;
      align-items: center;
      min-width: 0;
      font-size: 12px;
      color: #334155;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex: 0 0 10px;
    }

    .graph-shell {
      position: relative;
      border-radius: 8px;
      overflow: hidden;
      min-width: 0;
    }

    svg {
      display: block;
      width: 100%;
      height: 100%;
      background:
        linear-gradient(rgba(19, 31, 45, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(19, 31, 45, 0.035) 1px, transparent 1px),
        #fbfcfd;
      background-size: 28px 28px;
    }

    .toolbar {
      position: absolute;
      top: 12px;
      left: 12px;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      max-width: calc(100% - 24px);
    }

    .tool-btn {
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.92);
      color: #253044;
      cursor: pointer;
      font-size: 12px;
      font-weight: 650;
      padding: 0 10px;
      box-shadow: 0 4px 14px rgba(26, 39, 61, 0.08);
    }

    .tool-btn:hover {
      border-color: var(--line-strong);
    }

    .graph-stats {
      position: absolute;
      right: 12px;
      bottom: 12px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
      max-width: calc(100% - 24px);
      pointer-events: none;
    }

    .stat-pill {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 0 9px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.92);
      color: #334155;
      font-size: 12px;
      font-weight: 700;
      box-shadow: 0 4px 14px rgba(26, 39, 61, 0.08);
    }

    .edge {
      stroke: var(--line-strong);
      stroke-opacity: 0.42;
      stroke-linecap: round;
    }

    .edge.dim {
      stroke-opacity: 0.08;
    }

    .edge.focus {
      stroke: var(--accent-2);
      stroke-opacity: 0.92;
    }

    .node {
      cursor: pointer;
    }

    .node circle {
      stroke: #ffffff;
      stroke-width: 2.4;
      filter: drop-shadow(0 3px 5px rgba(15, 23, 42, 0.20));
    }

    .node.dim {
      opacity: 0.18;
    }

    .node.hidden,
    .edge.hidden {
      display: none;
    }

    .node.focus circle {
      stroke: #111827;
      stroke-width: 3.2;
    }

    .node.hover circle {
      stroke: var(--accent-2);
      stroke-width: 3.4;
    }

    .node-label {
      pointer-events: none;
      fill: #172033;
      font-size: 12px;
      font-weight: 700;
      paint-order: stroke;
      stroke: rgba(255, 255, 255, 0.88);
      stroke-width: 4px;
      stroke-linejoin: round;
    }

    .edge-label {
      pointer-events: none;
      fill: #64748b;
      font-size: 10px;
      font-weight: 600;
      paint-order: stroke;
      stroke: rgba(255, 255, 255, 0.9);
      stroke-width: 3px;
      stroke-linejoin: round;
    }

    .detail-kicker {
      margin: 0 0 6px;
      color: var(--accent);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .detail-title {
      margin: 0 0 8px;
      font-size: 20px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .meta-grid {
      display: grid;
      gap: 7px;
      margin: 12px 0;
    }

    .meta-row {
      display: grid;
      grid-template-columns: 86px 1fr;
      gap: 8px;
      font-size: 13px;
      line-height: 1.4;
    }

    .meta-key {
      color: var(--muted);
    }

    .meta-value {
      color: #1f2937;
      font-weight: 650;
    }

    .link-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 36px;
      margin: 4px 0 12px;
      padding: 0 12px;
      border-radius: 6px;
      background: var(--accent);
      color: #ffffff;
      font-size: 13px;
      font-weight: 750;
      text-decoration: none;
    }

    .link-button:hover {
      background: #075e59;
    }

    .neighbor-list {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .neighbor-list li {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px;
      font-size: 12px;
      line-height: 1.35;
      background: #fbfcfd;
    }

    .neighbor-button,
    .route-button {
      display: block;
      width: 100%;
      padding: 0;
      border: 0;
      background: transparent;
      color: inherit;
      cursor: pointer;
      text-align: left;
      font: inherit;
    }

    .neighbor-button:hover strong,
    .route-button:hover strong {
      color: var(--accent);
    }

    .neighbor-relation {
      display: block;
      color: var(--muted);
      margin-top: 3px;
    }

    .route-list {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .route-list li {
      display: grid;
      grid-template-columns: 24px 1fr;
      gap: 8px;
      align-items: start;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px;
      background: #fbfcfd;
      font-size: 12px;
      line-height: 1.35;
    }

    .route-step {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #eef2f7;
      color: #334155;
      font-size: 11px;
      font-weight: 800;
    }

    .route-course {
      display: block;
      margin-top: 3px;
      color: var(--muted);
    }

    .empty-state {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    @media (max-width: 980px) {
      body {
        overflow: auto;
      }

      .app {
        grid-template-columns: 1fr;
        height: auto;
        min-height: 100vh;
      }

      .graph-shell {
        min-height: 620px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <aside class="panel" aria-label="Graph controls">
      <div class="panel-inner">
        <h1 class="title">QE Knowledge Graph</h1>
        <p class="subtitle">Cross-course routes for Microeconomics, Econometrics, Asset Pricing, Corporate Finance, and problem sets.</p>

        <input id="search" class="search" type="search" placeholder="Search concepts, courses, exam modes" aria-label="Search concepts">

        <div class="section-title">Themes</div>
        <div id="themeChips" class="chips"></div>

        <div class="section-title">Exam Focus</div>
        <div id="examChips" class="chips"></div>

        <div class="section-title">Courses</div>
        <div id="courseFilters" class="course-list"></div>

        <div class="section-title">Legend</div>
        <div class="legend">
          <div class="legend-item"><span class="dot" style="background:var(--bridge)"></span> Bridge</div>
          <div class="legend-item"><span class="dot" style="background:var(--micro)"></span> Micro</div>
          <div class="legend-item"><span class="dot" style="background:var(--metrics)"></span> Metrics</div>
          <div class="legend-item"><span class="dot" style="background:var(--ap)"></span> AP</div>
          <div class="legend-item"><span class="dot" style="background:var(--corp)"></span> Corporate</div>
          <div class="legend-item"><span class="dot" style="background:var(--ps)"></span> QE-PS</div>
        </div>
      </div>
    </aside>

    <section class="graph-shell" aria-label="Interactive knowledge graph">
      <div class="toolbar">
        <button id="resetBtn" class="tool-btn" type="button">Reset View</button>
        <button id="fitBtn" class="tool-btn" type="button">Fit Graph</button>
        <button id="openBtn" class="tool-btn" type="button">Open Selected</button>
      </div>
      <svg id="graph" role="img" aria-label="QE cross-course knowledge graph"></svg>
      <div id="graphStats" class="graph-stats" aria-live="polite"></div>
    </section>

    <aside class="panel" aria-label="Node details">
      <div class="panel-inner">
        <p id="detailKicker" class="detail-kicker">Selected Node</p>
        <h2 id="detailTitle" class="detail-title">State Prices, SDF, Complete Markets</h2>
        <div id="detailMeta" class="meta-grid"></div>
        <a id="detailLink" class="link-button" href="/PhD-Course/Cross-Course/bridges/State_Prices_SDF_Complete_Markets.html" target="_parent">Open note</a>
        <div class="section-title">Review Route</div>
        <ul id="routeList" class="route-list"></ul>
        <div class="section-title">Connected Concepts</div>
        <ul id="neighbors" class="neighbor-list"></ul>
      </div>
    </aside>
  </main>

          updatePositions();
        });
        nodeLayer.appendChild(group);

    function runSimulation(iterations = 220) {
      const themeAnchors = new Map();
      const activeThemes = themes.filter((theme) => theme !== "All");
      activeThemes.forEach((theme, index) => {
        const angle = (index / activeThemes.length) * Math.PI * 2 - Math.PI / 2;
        themeAnchors.set(theme, {
          x: Math.cos(angle) * 250,
          y: Math.sin(angle) * 205
        });
      });

      for (let i = 0; i < iterations; i += 1) {
        for (let a = 0; a < layout.length; a += 1) {
          for (let b = a + 1; b < layout.length; b += 1) {
            const n1 = layout[a];
            const n2 = layout[b];
            const dx = n2.x - n1.x || 0.1;
            const dy = n2.y - n1.y || 0.1;
            const dist2 = dx * dx + dy * dy;
            const force = Math.min(1600 / dist2, 2.6);
            const dist = Math.sqrt(dist2);
            const fx = (dx / dist) * force;
            const fy = (dy / dist) * force;
            if (!n1.pinned) {
              n1.vx -= fx;
              n1.vy -= fy;
            }
            if (!n2.pinned) {
              n2.vx += fx;
              n2.vy += fy;
            }
          }
        }

        edges.forEach((edge) => {
          const source = layoutById.get(edge.source);
          const target = layoutById.get(edge.target);
          const dx = target.x - source.x;
          const dy = target.y - source.y;
          const dist = Math.sqrt(dx * dx + dy * dy) || 1;
          const ideal = 120 - edge.strength * 10;
          const force = (dist - ideal) * 0.008 * edge.strength;
          const fx = (dx / dist) * force;
          const fy = (dy / dist) * force;
          if (!source.pinned) {
            source.vx += fx;
            source.vy += fy;
          }
          if (!target.pinned) {
            target.vx -= fx;
            target.vy -= fy;
          }
        });

        layout.forEach((node) => {
          const anchor = themeAnchors.get(node.theme);
          if (anchor && !node.pinned) {
            const centerPull = node.course === "Bridge" ? 0.035 : 0.012;
            node.vx += (anchor.x - node.x) * centerPull;
            node.vy += (anchor.y - node.y) * centerPull;
          }
          if (!node.pinned) {
            node.vx *= 0.74;
            node.vy *= 0.74;
            node.x += node.vx;
            node.y += node.vy;
          }
        });
      }
      updatePositions();
    }

    function updatePositions() {
      [...edgeLayer.children].forEach((line, index) => {
        const edge = edges[index];
        const source = layoutById.get(edge.source);
        const target = layoutById.get(edge.target);
        line.setAttribute("x1", source.x);
        line.setAttribute("y1", source.y);
        line.setAttribute("x2", target.x);
        line.setAttribute("y2", target.y);
      });

      [...edgeLabelLayer.children].forEach((label, index) => {
        const edge = edges[index];
        const source = layoutById.get(edge.source);
        const target = layoutById.get(edge.target);
        label.setAttribute("x", (source.x + target.x) / 2);
        label.setAttribute("y", (source.y + target.y) / 2 - 4);
      });

      [...nodeLayer.children].forEach((group) => {
        const node = layoutById.get(group.dataset.id);
        group.setAttribute("transform", `translate(${node.x},${node.y})`);
      });
    }

    function render() {
      const visibleIds = visibleNodeIds();
      const focusId = state.hovered || state.selected;
      const neighborIds = new Set((adjacent.get(focusId) || []).map((item) => item.id));
      const focusVisible = visibleIds.has(focusId);

      [...nodeLayer.children].forEach((group) => {
        const id = group.dataset.id;
        const visible = visibleIds.has(id);
        group.classList.toggle("hidden", !visible);
        group.classList.toggle("focus", id === state.selected);
        group.classList.toggle("hover", id === state.hovered);
        const dim = focusVisible && id !== focusId && !neighborIds.has(id);
        group.classList.toggle("dim", dim);

      [...edgeLayer.children].forEach((line) => {
        const source = line.dataset.source;
        const target = line.dataset.target;
        const visible = visibleIds.has(source) && visibleIds.has(target);
        const focus = focusVisible && (source === focusId || target === focusId);
        line.classList.toggle("hidden", !visible);
        line.classList.toggle("focus", focus);
        line.classList.toggle("dim", focusVisible && !focus);
      });

      [...edgeLabelLayer.children].forEach((label) => {
        const source = label.dataset.source;
        const target = label.dataset.target;
        const visible = visibleIds.has(source) && visibleIds.has(target);

      updateDetails();
      updateStats(visibleIds);

              <span class="route-course">${item.course} | ${item.examModes.join(", ")}</span>
            </button>
          </li>
        `;
      }).join("");
      routeList.querySelectorAll("[data-node-id]").forEach((button) => {
        button.addEventListener("click", () => {
          selectNode(button.dataset.nodeId);
        });
      });
    }

    function updateStats(visibleIds) {
      const visibleEdges = edges.filter((edge) => visibleIds.has(edge.source) && visibleIds.has(edge.target)).length;
      const focus = examFocuses.find((item) => item.id === state.examFocus);
      graphStats.innerHTML = `
        <span class="stat-pill">${visibleIds.size} nodes</span>
        <span class="stat-pill">${visibleEdges} links</span>
        <span class="stat-pill">${state.theme === "All" ? "all themes" : state.theme}</span>
        <span class="stat-pill">${focus ? focus.label : "All modes"}</span>
      `;
    }

    function selectNode(id) {
      state.selected = id;
      render();
    }

    function updateTransform() {
      g.setAttribute("transform", `translate(${state.offsetX},${state.offsetY}) scale(${state.scale})`);
    }

    function fitGraph() {
      const visible = layout.filter(isVisible);
      if (!visible.length) return;
      const xs = visible.map((node) => node.x);
      const ys = visible.map((node) => node.y);
      const minX = Math.min(...xs);
      const maxX = Math.max(...xs);
      const minY = Math.min(...ys);
      const maxY = Math.max(...ys);
      const graphW = Math.max(1, maxX - minX + 180);
      const graphH = Math.max(1, maxY - minY + 160);
      state.scale = Math.max(0.72, Math.min(1.35, Math.min(width / graphW, height / graphH)));
      state.offsetX = -((minX + maxX) / 2) * state.scale;
      state.offsetY = -((minY + maxY) / 2) * state.scale;
      updateTransform();
    }

    function pointerToGraph(event) {
      const point = svg.createSVGPoint();
      point.x = event.clientX;
      point.y = event.clientY;
      const transformed = point.matrixTransform(svg.getScreenCTM().inverse());
      return {
        x: (transformed.x - state.offsetX) / state.scale,
        y: (transformed.y - state.offsetY) / state.scale
      };
    }

    function initInteractions() {
      searchInput.addEventListener("input", () => {
        state.query = searchInput.value.trim().toLowerCase();
        render();
      });

      resetBtn.addEventListener("click", () => {
        state.theme = "All";
        state.examFocus = "All";
        state.query = "";
        searchInput.value = "";
        state.courses = new Set(courses.map((course) => course.id));
        [...themeChips.children].forEach((child, index) => child.classList.toggle("active", index === 0));
        [...examChips.children].forEach((child, index) => child.classList.toggle("active", index === 0));
        [...courseFilters.querySelectorAll("input")].forEach((input) => {
          input.checked = true;
        });
        layout.forEach((node) => {
          node.pinned = false;
        });
        runSimulation(140);
        fitGraph();
        render();
      });

      fitBtn.addEventListener("click", fitGraph);
      openBtn.addEventListener("click", () => {
        const node = nodeById.get(state.selected);
        if (node) {
          window.parent.location.href = node.url;
        }
      });

      svg.addEventListener("pointerdown", (event) => {
        if (event.target.closest && event.target.closest(".node")) return;
        draggingCanvas = true;
        lastPointer = { x: event.clientX, y: event.clientY };
        svg.setPointerCapture(event.pointerId);
      });
      svg.addEventListener("pointermove", (event) => {
        if (!draggingCanvas) return;
        state.offsetX += event.clientX - lastPointer.x;
        state.offsetY += event.clientY - lastPointer.y;
        lastPointer = { x: event.clientX, y: event.clientY };
        updateTransform();
      });
      svg.addEventListener("pointerup", () => {
        draggingCanvas = false;
        lastPointer = null;
      });
      svg.addEventListener("wheel", (event) => {
        event.preventDefault();
        const delta = event.deltaY < 0 ? 1.08 : 0.92;
        state.scale = Math.max(0.45, Math.min(2.2, state.scale * delta));
        updateTransform();
      }, { passive: false });
      svg.addEventListener("click", () => {
        render();
      });
    }

    createControls();
    initGraphElements();
    initInteractions();
    resize();
    runSimulation();
    fitGraph();
    render();
    window.addEventListener("resize", () => {
      resize();
      fitGraph();
    });
  </script>
</body>
</html>
